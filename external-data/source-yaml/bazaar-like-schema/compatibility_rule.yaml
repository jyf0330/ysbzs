schema: ysbzs.bazaar_like.compatibility_rule.v1
notes:
  - "防回流、防误接、防旧规则复活。"
  - "可给 gpt_test.js / lint script 做扫描。"
hard_rules:
  - rule_id: shop_sells_only_pals_v1
    severity: error
    description: "第一版普通商店只卖 Pal，不能卖 relic。"
    assert:
      merchant_pool_rule.include_categories_only: [pal]
  - rule_id: relic_from_event_level_battle_only
    severity: error
    description: "遗物来源只能是事件、升级奖励、战斗奖励。"
    assert:
      card_master.category_relic.shop_sellable: false
  - rule_id: no_legacy_shop_pools_main_flow
    severity: error
    description: "新主流程不能直接依赖旧 SHOP_POOLS。"
    banned_runtime_refs:
      - "SHOP_POOLS"
      - "genShop_old"
      - "fire_starter"
      - "water_droplet"
  - rule_id: fire_cross_explode_only_diamond_fire_archon
    severity: error
    description: "十字 5 格火引爆只允许钻石火魔在场或背包时触发。"
    assert:
      effect_id: effect_fire_archon_cross_explode
      required_source_card_id: pal_fire_archon
      required_source_tier: diamond
      required_source_location_any: [active, backpack]
  - rule_id: terrain_layer_not_unit_layer
    severity: error
    description: "陷阱是地形层，不占单位层，英雄可站在陷阱上。"
    assert:
      trap_layer: terrain
      blocks_unit_layer: false
  - rule_id: monster_move_step_resolves_terrain
    severity: error
    description: "怪物每移动一格都必须结算地形/陷阱。"
    required_trigger_id: on_monster_move_step
  - rule_id: logs_must_write_dom_and_action_log
    severity: error
    description: "商店/事件/升级/怪物移动/陷阱触发必须同时写 DOM log 和 G.actionLog。"
    required_channels: [dom_log, action_log]
  - rule_id: player_behavior_tests_required
    severity: error
    description: "最终验收必须覆盖玩家入口，不允许只调用内部函数。"
    required_flow:
      - player_entry
      - state_change
      - log_change
      - render_update
soft_rules:
  - rule_id: avoid_too_many_limits
    severity: warning
    description: "新机制默认保留强反馈，实测失控后再补限制。"
  - rule_id: names_should_be_simple
    severity: warning
    description: "名字应清楚、中文、易懂，不要奇怪或太像外部游戏原名。"
