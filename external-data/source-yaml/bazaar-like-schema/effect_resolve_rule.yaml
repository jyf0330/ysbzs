schema: ysbzs.bazaar_like.effect_resolve_rule.v1
notes:
  - "统一定义：触发后具体做什么。"
  - "不要在 JS 里散落写死效果；JS 只实现 resolve type。"
  - "第一版 resolve type 保持少而强。"
resolve_types:
  - type: gain_gold
    params: [amount]
  - type: spend_gold
    params: [amount]
  - type: gain_card
    params: [card_id, target_zone]
  - type: gain_card_by_filter
    params: [category, required_tags_any, tiers, target_zone]
  - type: upgrade_by_tag
    params: [required_tag, max_tier]
  - type: upgrade_selected_pal
    params: [max_tier]
  - type: modify_selected_pal
    params: [hp_delta, atk_delta, layer_delta, slot_value_bonus]
  - type: capacity_up
    params: [target, amount]
  - type: add_element_layers
    params: [element, layers, target_scope]
  - type: add_trap_layers
    params: [element, layers, target_cells]
  - type: deal_damage
    params: [amount, element, target_scope]
  - type: heal
    params: [amount, target_scope]
  - type: add_shield
    params: [amount, target_scope]
  - type: modify_ap
    params: [amount, target_scope]
  - type: modify_shop_offer_weight
    params: [required_tags_any, weight_delta]
  - type: modify_reroll_cost
    params: [amount_delta, min_value]
  - type: add_log
    params: [log_key, data]
resolve_rules:
  - effect_id: effect_ember_badge_shop_bias
    name: 火种徽记：商店火系倾向
    source_card_id: relic_ember_badge
    trigger_id: on_shop_offer_roll
    type: modify_shop_offer_weight
    params:
      required_tags_any: [fire]
      weight_delta: 20
    log_key: shop_bias_fire

  - effect_id: effect_ember_badge_buy_fire_gold
    name: 火种徽记：购买火系返还
    source_card_id: relic_ember_badge
    trigger_id: on_shop_buy
    condition:
      target_tags_any: [fire]
      once_per_shop: true
    type: gain_gold
    params:
      amount: 1
    log_key: buy_fire_refund

  - effect_id: effect_trap_map_bonus
    name: 陷阱地图：陷阱加层
    source_card_id: relic_trap_map
    trigger_id: on_element_apply
    condition:
      target_tags_any: [trap]
    type: add_trap_layers
    params:
      element: same_as_source
      layers: 1
      target_cells: source_cells
    log_key: trap_layer_bonus

  - effect_id: effect_spring_bottle_battle_start
    name: 回泉瓶：战斗开始回复
    source_card_id: relic_spring_bottle
    trigger_id: on_battle_start
    type: heal
    params:
      amount: 2
      target_scope: allies_all
    log_key: battle_start_heal

  - effect_id: effect_fire_archon_cross_explode
    name: 火魔：钻石十字火引爆
    source_card_id: pal_fire_archon
    trigger_id: on_fire_explode
    condition:
      source_tier: diamond
      source_location_any: [active, backpack]
    type: deal_damage
    params:
      amount: same_as_explode_damage
      element: fire
      target_scope: cross_5_cells
    log_key: fire_archon_cross_explode

  - effect_id: effect_trap_enter_damage
    name: 陷阱踩入伤害
    source_card_id: terrain_trap
    trigger_id: on_trap_enter
    type: deal_damage
    params:
      amount: trap_layers_sum
      element: same_as_trap
      target_scope: entering_actor
    log_key: trap_enter_damage

  - effect_id: effect_trap_enter_ap
    name: 陷阱踩入 AP 变化
    source_card_id: terrain_trap
    trigger_id: on_trap_enter
    type: modify_ap
    params:
      amount: trap_ap_delta
      target_scope: entering_actor
    log_key: trap_enter_ap_delta

  - effect_id: effect_event_pack_expand_active
    name: 背包扩容：上阵容量
    source_card_id: event_pack_expand
    trigger_id: on_event_select
    type: capacity_up
    params:
      target: active
      amount: 1
    log_key: capacity_active_up
