schema: ysbzs.bazaar_like.hero_level_rule.v1
notes:
  - "Hero level is the run-level growth track, not Pal quality."
  - "First version supports one starting hero: ember_tamer."
  - "Hero level rewards can grant Pal upgrades, relics, capacity, gold, or tag-biased choices."
hero_level_rules:
  - hero_id: ember_tamer
    max_level: 4
    xp_sources:
      battle_win: 1
      boss_win: 2
      skip_shop_option: 1
      event_reward: 1
    levels:
      - level: 1
        display_name: Lv1
        xp_required_total: 0
        unlocks:
          - starting_pal
          - starting_relic
        reward_pool_id: reward_hero_lv1_ember
      - level: 2
        display_name: Lv2
        xp_required_total: 3
        unlocks:
          - level_reward_choice
        reward_pool_id: reward_hero_lv2_ember
      - level: 3
        display_name: Lv3
        xp_required_total: 7
        unlocks:
          - stronger_event_bias
          - gold_reward_bias
        reward_pool_id: reward_hero_lv3_ember
      - level: 4
        display_name: Lv4
        xp_required_total: 12
        unlocks:
          - diamond_reward_bias
          - hero_special_relic_chance
        reward_pool_id: reward_hero_lv4_ember
