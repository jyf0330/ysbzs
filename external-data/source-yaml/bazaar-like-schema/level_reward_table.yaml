schema: ysbzs.bazaar_like.level_reward_table.v1
reward_pools:
  - reward_pool_id: reward_hero_lv1_ember
    rewards:
      - reward_id: lv1_starting_kit
        type: starting_kit
        weight: 100
        params:
          pals: [pal_fire_seed]
          relics: [relic_ember_badge]

  - reward_pool_id: reward_hero_lv2_ember
    choose_count: 1
    rewards:
      - reward_id: lv2_gain_fire_pal
        type: gain_card_by_filter
        weight: 40
        params:
          category: pal
          required_tags_any: [fire]
          tiers: [bronze, silver]
      - reward_id: lv2_upgrade_fire_pal
        type: upgrade_by_tag
        weight: 35
        params:
          required_tag: fire
          max_tier: gold
      - reward_id: lv2_gain_gold
        type: gain_gold
        weight: 25
        params:
          amount: 4

  - reward_pool_id: reward_hero_lv3_ember
    choose_count: 1
    rewards:
      - reward_id: lv3_gain_relic_fire
        type: gain_card_by_filter
        weight: 35
        params:
          category: relic
          required_tags_any: [fire]
          tiers: [silver, gold]
      - reward_id: lv3_upgrade_any_pal
        type: upgrade_random_pal
        weight: 35
        params:
          max_tier: gold
      - reward_id: lv3_capacity_up
        type: capacity_up
        weight: 30
        params:
          target: active
          amount: 1

  - reward_pool_id: reward_hero_lv4_ember
    choose_count: 1
    rewards:
      - reward_id: lv4_gain_diamond_fire_pal
        type: gain_card_by_filter
        weight: 35
        params:
          category: pal
          required_tags_any: [fire]
          tiers: [diamond]
      - reward_id: lv4_gain_hero_relic
        type: gain_card_by_filter
        weight: 35
        params:
          category: relic
          required_tags_any: [hero_only, fire]
          tiers: [gold, diamond]
      - reward_id: lv4_upgrade_fire_to_diamond
        type: upgrade_by_tag
        weight: 30
        params:
          required_tag: fire
          max_tier: diamond
