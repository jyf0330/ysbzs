schema: ysbzs.bazaar_like.log_template.v1
notes:
  - "统一 DOM log 与 G.actionLog 的结构化日志。"
  - "所有关键行为必须同时可见于玩家日志和结构化日志。"
log_channels:
  - id: dom_log
    target: "#log"
  - id: action_log
    target: "G.actionLog"
required_fields:
  - type
  - timestamp
  - day
  - phase
  - actor
  - target
  - delta
  - result
templates:
  - log_key: shop_enter
    type: SHOP_ENTER
    text: "第{day}天进入商店：出现{option_count}个选项。"
  - log_key: shop_offer_roll
    type: SHOP_OFFER_ROLL
    text: "{merchant_name}摆出{offer_count}个商品。"
  - log_key: shop_buy
    type: SHOP_BUY
    text: "购买{card_name}：金币{gold_before}→{gold_after}，进入{target_zone}。"
  - log_key: shop_buy_fail
    type: SHOP_BUY_FAIL
    text: "购买{card_name}失败：金币不足或容量不足。"
  - log_key: shop_reroll
    type: SHOP_REROLL
    text: "刷新{merchant_name}：金币{gold_before}→{gold_after}，刷新次数{reroll_before}→{reroll_after}。"
  - log_key: event_select
    type: EVENT_SELECT
    text: "选择事件{event_name}：获得{reward_text}。"
  - log_key: hero_level_up
    type: HERO_LEVEL_UP
    text: "{hero_name}升级：Lv{level_before}→Lv{level_after}，获得{reward_text}。"
  - log_key: pal_merge
    type: PAL_MERGE
    text: "{pal_name}合成：{tier_before}→{tier_after}。"
  - log_key: battle_start
    type: BATTLE_START
    text: "战斗开始：第{day}天{phase}，敌人{monster_count}只。"
  - log_key: monster_move_step
    type: MONSTER_MOVE_STEP
    text: "{monster_name}移动：{from_cell}→{to_cell}，AP {ap_before}→{ap_after}。"
  - log_key: trap_enter_damage
    type: TRAP_ENTER_DAMAGE
    text: "{monster_name}踩入{element}陷阱：HP {hp_before}→{hp_after}，伤害{damage}。"
  - log_key: fire_archon_cross_explode
    type: FIRE_ARCHON_CROSS_EXPLODE
    text: "钻石火魔触发十字火引爆：中心{center_cell}，造成{damage}伤害。"
validation_rules:
  - id: every_dom_log_has_action_log
    description: "关键玩家行为必须写入 G.actionLog。"
  - id: no_internal_only_battle_result
    description: "不能只靠内部函数日志证明玩家链路可用。"
