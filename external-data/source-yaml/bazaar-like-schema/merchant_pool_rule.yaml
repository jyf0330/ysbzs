schema: ysbzs.bazaar_like.merchant_pool_rule.v1
merchant_pool_rules:
  - merchant_id: merchant_basic_pals
    include_categories: [pal]
    include_tags: []
    exclude_tags: [hero_only]
    include_tiers: [bronze, silver]
    include_sizes: [small, medium]
    include_elements: [fire, water, wind, earth]
    include_hero_scope: [common]
    min_day: 1
    max_day: 4
    weight: 100
    guaranteed_slots:
      - slot: 1
        tier: bronze
      - slot: 2
        tier: bronze
  - merchant_id: merchant_basic_pals
    include_categories: [pal]
    include_tags: []
    exclude_tags: []
    include_tiers: [bronze, silver, gold]
    include_sizes: [small, medium, large]
    include_elements: [fire, water, wind, earth]
    include_hero_scope: [common, current_hero]
    min_day: 5
    max_day: 10
    weight: 80
    guaranteed_slots: []

  - merchant_id: merchant_element_pals
    include_categories: [pal]
    include_tags: [fire, water, wind, earth]
    match_mode: any_tag
    exclude_tags: []
    include_tiers: [bronze, silver]
    include_sizes: [small, medium]
    include_hero_scope: [common]
    min_day: 1
    max_day: 4
    weight: 100
    guaranteed_slots:
      - slot: 1
        required_tags_any: [fire, water, wind, earth]
  - merchant_id: merchant_element_pals
    include_categories: [pal]
    include_tags: [fire, water, wind, earth]
    match_mode: any_tag
    exclude_tags: []
    include_tiers: [bronze, silver, gold, diamond]
    include_sizes: [small, medium, large]
    include_hero_scope: [common, current_hero]
    min_day: 5
    max_day: 10
    weight: 100
    guaranteed_slots: []

  - merchant_id: merchant_summon_pals
    include_categories: [pal]
    include_tags: [summon]
    match_mode: any_tag
    exclude_tags: []
    include_tiers: [silver, gold]
    include_sizes: [small, medium, large]
    include_hero_scope: [common, current_hero]
    min_day: 3
    max_day: 10
    weight: 70
    guaranteed_slots:
      - slot: 1
        required_tags_any: [summon]

  - merchant_id: merchant_gold_pals
    include_categories: [pal]
    include_tags: []
    exclude_tags: []
    include_tiers: [silver, gold]
    include_sizes: [small, medium, large]
    include_hero_scope: [common, current_hero]
    min_day: 5
    max_day: 6
    weight: 100
    guaranteed_slots:
      - slot: 1
        tier: gold
  - merchant_id: merchant_gold_pals
    include_categories: [pal]
    include_tags: []
    exclude_tags: []
    include_tiers: [silver, gold, diamond]
    include_sizes: [small, medium, large]
    include_hero_scope: [common, current_hero]
    min_day: 7
    max_day: 10
    weight: 100
    guaranteed_slots:
      - slot: 1
        tier: gold

  - merchant_id: merchant_diamond_pals
    include_categories: [pal]
    include_tags: []
    exclude_tags: []
    include_tiers: [gold, diamond]
    include_sizes: [medium, large]
    include_hero_scope: [common, current_hero]
    min_day: 7
    max_day: 10
    weight: 100
    guaranteed_slots:
      - slot: 1
        tier: diamond
