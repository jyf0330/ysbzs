schema: ysbzs.bazaar_like.pve_reward_rule.v1
notes:
  - "战斗/PvE 奖励表，连接 encounter_schedule、monster_master、hero_level_rule。"
  - "第一版奖励强一点，符合 ysbzs 快节奏。"
pve_reward_rules:
  - encounter_type: battle
    default_rewards:
      - type: gain_gold
        amount_formula: "1 + floor(day / 2)"
      - type: gain_hero_xp
        amount: 1
    bonus_by_day:
      - min_day: 5
        rewards:
          - type: reward_pool
            reward_pool_id: reward_relic_common
            chance: 20
      - min_day: 7
        rewards:
          - type: gain_card_by_filter
            chance: 15
            params:
              category: pal
              tiers: [gold, diamond]
  - encounter_type: boss
    default_rewards:
      - type: gain_gold
        amount_formula: "3 + day"
      - type: gain_hero_xp
        amount: 2
      - type: reward_pool
        reward_pool_id: reward_relic_common
    guaranteed_choices:
      choose_count: 1
      choices:
        - type: upgrade_random_pal
          max_tier: diamond
        - type: gain_card_by_filter
          category: relic
          tiers: [silver, gold, diamond]
        - type: capacity_up
          target: backpack
          amount: 2
monster_drop_rules:
  - monster_tier: bronze
    drop_gold: 0
    drop_xp: 0
  - monster_tier: silver
    drop_gold: 1
    drop_xp: 0
  - monster_tier: gold
    drop_gold: 2
    drop_xp: 1
  - monster_tier: diamond
    drop_gold: 3
    drop_xp: 1
