relic_effect:
  - relic_id: relic_coin_bag
    trigger: on_shop_enter
    condition: always
    effect_type: gain_gold
    value: 1
    target: player
  - relic_id: relic_old_map
    trigger: on_shop_enter
    condition: always
    effect_type: min_shop_events
    value: 1
    target: shop
  - relic_id: relic_training_whistle
    trigger: on_battle_start
    condition: ally_pal
    effect_type: add_atk
    value: 1
    target: all_allies
  - relic_id: relic_thick_collar
    trigger: on_battle_start
    condition: ally_pal
    effect_type: add_hp
    value: 2
    target: all_allies
  - relic_id: relic_small_bag
    trigger: on_gain_relic
    condition: self
    effect_type: add_bag_capacity
    value: 2
    target: player
  - relic_id: relic_battle_flag
    trigger: on_gain_relic
    condition: self
    effect_type: add_bench_capacity
    value: 1
    target: player
  - relic_id: relic_merge_badge
    trigger: on_pal_merged
    condition: always
    effect_type: gain_gold
    value: 1
    target: player
  - relic_id: relic_pet_cookie
    trigger: on_pal_gained
    condition: new_pal
    effect_type: add_hp
    value: 2
    target: gained_pal
  - relic_id: relic_monster_manual
    trigger: on_battle_start
    condition: enemy_exists
    effect_type: enemy_atk_down
    value: 1
    target: random_enemy
  - relic_id: relic_element_stone
    trigger: on_unit_action
    condition: first_action_each_battle
    effect_type: add_layer
    value: 1
    target: action_cell
  - relic_id: relic_hero_fire_seed
    trigger: on_unit_action
    condition: ally.element=fire
    effect_type: add_element_layer
    value: 1
    target: action_cell
  - relic_id: relic_hero_burst_core
    trigger: on_fire_explode
    condition: always
    effect_type: add_explosion_damage
    value: 1
    target: fire_explosion
  - relic_id: relic_hero_charred_crown
    trigger: on_fire_explode
    condition: first_fire_explode_each_battle
    effect_type: gain_gold
    value: 1
    target: player
  - relic_id: relic_hero_flame_collar
    trigger: on_battle_start
    condition: ally.element=fire
    effect_type: add_hp_atk
    value: hp+2,atk+1
    target: fire_allies
  - relic_id: relic_hero_diamond_inferno
    trigger: on_fire_explode
    condition: first_fire_explode_each_battle
    effect_type: cross_explosion
    value: 5
    target: center_plus_cross
