schema: ysbzs.bazaar_like.naming_rules.v1
goal: "Names should be clean, readable, and close to ysbzs theme. Avoid weird joke names."
avoid:
  - "Do not use The Bazaar original item, merchant, hero, event, monster names."
  - "Do not use long internet meme names."
  - "Do not use abstract English IDs as display names."
  - "Do not over-fantasy names that players cannot understand."
style:
  merchant_names:
    good:
      - 宠物小摊
      - 元素宠物铺
      - 召唤宠物铺
      - 黄金宠物铺
      - 钻石珍宠铺
    bad:
      - 星界万象折跃商
      - 量子灵魂邮差
      - 不明命运咏叹铺
  pal_names:
    good:
      - 火苗灵
      - 滴滴灵
      - 风雀
      - 陷地鼹
      - 雨壳兽
    bad:
      - 终焉炽灭圣兽
      - 第七维度风神王
      - 呜哇火火侠
  event_names:
    good:
      - 宠物训练
      - 遗物发现
      - 火种试炼
      - 背包扩容
    bad:
      - 灵魂命运大审判
      - 星空契约重铸祭典
id_rules:
  use_lower_snake_case: true
  prefix_by_category:
    pal: "pal_"
    relic: "relic_"
    merchant: "merchant_"
    event: "event_"
    reward: "reward_"
    monster: "mon_"
