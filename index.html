    const def=UNIT_DEFS[u.defId]; if(!def)return;
    const lvl=def.levels[u.level];
    h+=`<div class="si" style="opacity:0.7">
      <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0">
        <span style="font-size:12px;color:#888">💤备战 Lv${u.level}</span>
        <span style="color:${EC[def.element]}">${def.name}</span>
        <span style="font-size:10px;color:#888">HP:${u.hp}/${u.maxHp}</span>
      </div>
      <div style="display:flex;gap:3px">
        ${activeUnits.length<2?`<button class="bb" style="font-size:10px;padding:2px 4px" onclick="toggleUnitActive('${u.instanceId}')">上阵</button>`:''}
        <button class="bb" style="font-size:10px;padding:2px 4px;background:#7f1d1d" onclick="sellUnit('${u.instanceId}')">💸出售</button>
      </div>
    </div>`;
  });
  h+=`</div>`;

  // === 背包 ===
  h+=`<div class="ss"><div class="sstt">🎒 背包（${G.backpack.length}件）</div>`;
  if(G.backpack.length===0){
    h+=`<div style="color:#555;font-size:12px;padding:8px;text-align:center">背包为空</div>`;
  } else {
    G.backpack.forEach(bp=>{
      h+=`<div class="si" style="justify-content:space-between">
        <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0">
          <span style="font-size:14px">${bp.name.split(' ')[0]}</span>
          <div>
            <div class="si-n">${bp.name}</div>
            <div class="si-s">${bp.desc}</div>
          </div>
        </div>
        <button class="bb" onclick="useBackpackItem('${bp.bpId}')">使用</button>
      </div>`;
    });
  }
  h+=`</div>`;

  // === 当前行动槽 ===
  h+=`<div class="ss"><div class="sstt">当前行动点配置（${G.slots.length}槽）</div>
    ${G.slots.map((s,i)=>{
      const hero=G.heroes[s.hid];
      return`<div style="font-size:10px;margin:3px 0;display:flex;align-items:center;gap:5px">
        <span style="color:#555;min-width:28px">槽${i+1}:</span>
        ${shapeHTML(s.sn,s.el,6)}
        <span style="color:${EC[s.el]}">${EL[s.el]}·${SD[s.sn]?.name||s.sn}号</span>
        <span style="color:#888">×${TIER_MULT[s.tier]}</span>
        <span style="color:#555;font-size:9px">(${hero?hero.name:'?'})</span>
      </div>`;
    }).join('')}
  </div>`;

  document.getElementById('scat').innerHTML=h;
}

function buyConsumable(itemId){
  if(G.phase!=='SHOP')return;
  const idx=G.shopItems.consumables.findIndex(c=>c.id===itemId);
  if(idx===-1)return;
  const item=G.shopItems.consumables[idx];
  if(G.gold<item.cost){showMsg('💰 金币不足！');return;}
  G.gold-=item.cost;
  G.shopItems.consumables.splice(idx,1);
  if(item.type==='coin_bag'){
    G.gold+=3;
    glog('💰 金币袋：获得3金币！');
  } else if(item.type==='hp_potion'||item.type==='hp_potion2'){
    G.backpack.push({...item,bpId:`bp_${G._bpCnt++}`});
    glog(`📦 ${item.name} 放入背包，可在阵容区使用`);
  } else if(item.type==='board_el'){
    G.backpack.push({...item,bpId:`bp_${G._bpCnt++}`});
    glog(`📦 ${item.name} 放入背包，可在战斗中使用`);
  } else if(item.type==='relic'){
    if(!G.relics.find(r=>r.relicId===item.relicId)){
      G.relics.push({relicId:item.relicId,name:item.name,desc:item.desc});
      glog(`🏆 获得遗物：${item.name}！${item.desc}`);
    } else {
      glog(`⚠️ 已拥有${item.name}，不能重复获得`);
      G.gold+=item.cost; G.shopItems.consumables.splice(idx,0,item);
    }
  } else if(item.type==='el_up'||item.type==='el_up2'||item.type==='el_up3'||item.type==='tier_up'){
    G.backpack.push({...item,bpId:`bp_${G._bpCnt++}`});
    glog(`📦 ${item.name} 放入背包，可在阵容区装备到行动槽`);
  }
  renderShop();
}

function useBackpackItem(bpId){
  const idx=G.backpack.findIndex(b=>b.bpId===bpId);
  if(idx===-1)return;
  const item=G.backpack[idx];
  if(item.type==='hp_potion'||item.type==='hp_potion2'){
    const heal=item.type==='hp_potion'?5:10;
    const heroes=Object.values(G.heroes).filter(h=>h.hp>0);
    if(heroes.length===0){showMsg('没有存活的英雄！');return;}
    const h=heroes[0];
    const oldHp=h.hp;
    h.hp=Math.min(h.hp+heal,h.maxHp);
    const u=getUnitByHeroId(h.id); if(u)u.hp=h.hp;
    glog(`💚 ${h.name} 恢复 ${h.hp-oldHp} HP（${h.hp}/${h.maxHp}）`);
  } else if(item.type==='board_el'){
    if(G.phase!=='PLAYER'){showMsg('只能在战斗阶段使用棋盘元素！');return;}
    const empty=[];
    for(let r=0;r<13;r++)for(let c=0;c<13;c++){
      if(!G.board[r][c].el&&!monAt({r,c})&&!heroAt({r,c}))empty.push({r,c});
    }
    if(empty.length===0){showMsg('没有空格可以放置元素！');return;}
    const pos=empty[ri(empty.length)];
    addEl(pos,item.el||'fire');
    glog(`🌱 在(${pos.r},${pos.c})放置1层${EL[item.el||'fire']}元素`);
  } else {
    showMsg('该物品功能开发中');
    return;
  }
  G.backpack.splice(idx,1);
  renderShop(); refreshUI();
}

function toggleUnitActive(instanceId){
  const unit=G.ownedUnits.find(u=>u.instanceId===instanceId);
  if(!unit)return;
  if(unit.active){
    unit.active=false;
  } else {
    const activeCount=G.ownedUnits.filter(u=>u.active).length;
    if(activeCount>=6){showMsg('最多上阵6个单位！');return;}
    unit.active=true;
  }
  syncUnitsToHeroes();
  renderShop(); refreshUI();
}

// 保留旧函数别名（向后兼容）
function refreshShop(){ rollShop(); }
function genShop_old(){
  G.shopItems=[]; for(let i=0;i<3;i++){const el=['fire','water','wind','earth'][Math.floor(Math.random()*4)],sn=Math.floor(Math.random()*20)+1,tier=1,cost=SD[sn].n<=1?1:SD[sn].n<=3?2:SD[sn].n<=4?3:4;G.shopItems.push({id:`si${i}`,el,sn,tier,name:bname(el,sn,tier),cost});}
}

// ========== UTILS ==========
function glog(t){
  const el=document.getElementById('log');
  const d=document.createElement('div');d.textContent=t;el.appendChild(d);
  el.scrollTop=el.scrollHeight;
  while(el.children.length>60)el.removeChild(el.firstChild);
}

function showMsg(t){document.getElementById('msgt').textContent=t;document.getElementById('msg').style.display='block';}

// ========== START ==========
initGame();
</script>
