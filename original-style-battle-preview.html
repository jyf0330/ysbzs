<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>元素背包史 · 原母版风格预览</title>
<style>
  :root{
    --base-w: 1536px;
    --base-h: 1024px;
    --bg: #17100d;
    --ink: #2f2118;
    --paper: #eadcc0;
    --line: rgba(95, 64, 37, 0.78);
    --debug-fill: rgba(231, 172, 74, 0.14);
    --debug-border: rgba(177, 109, 28, 0.72);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:
      radial-gradient(circle at 50% 18%, rgba(246, 231, 187, 0.08), transparent 26%),
      radial-gradient(circle at 50% 84%, rgba(246, 231, 187, 0.06), transparent 28%),
      linear-gradient(180deg, #261a15 0%, #120c0a 100%);
    color:#f6ead0;
    font-family:"Hiragino Maru Gothic ProN","Klee","YuKyokasho","PingFang SC",sans-serif;
  }
  body{
    position:relative;
  }
  #viewport{
    position:absolute;
    inset:0;
    overflow:hidden;
  }
  #shell{
    position:absolute;
    left:0;
    top:0;
    width:var(--base-w);
    height:var(--base-h);
    transform-origin: top left;
    box-shadow:
      0 24px 70px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,245,218,0.08);
  }
  #artboard{
    position:relative;
    width:100%;
    height:100%;
  }
  .layer{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    user-select:none;
    -webkit-user-drag:none;
    pointer-events:none;
  }
  .region{
    position:absolute;
    display:none;
    background:var(--debug-fill);
    border:2px dashed var(--debug-border);
    box-shadow: inset 0 0 0 1px rgba(255, 248, 222, 0.35);
  }
  .region::after{
    content:attr(data-label);
    position:absolute;
    left:6px;
    top:6px;
    padding:2px 6px;
    border-radius:999px;
    background:rgba(53, 34, 18, 0.84);
    color:#f5dfad;
    font-size:12px;
    line-height:1.2;
    letter-spacing:0.5px;
    white-space:nowrap;
  }
  body.debug .region{
    display:block;
  }
  #hud-note{
    position:absolute;
    right:20px;
    bottom:18px;
    padding:8px 12px;
    border-radius:999px;
    border:1px solid rgba(255, 240, 205, 0.16);
    background:rgba(18, 12, 10, 0.72);
    color:#dbc293;
    font-size:12px;
    letter-spacing:0.4px;
    backdrop-filter: blur(4px);
  }
  #debug-panel{
    display:none;
    position:absolute;
    left:20px;
    bottom:18px;
    width:min(460px, calc(100vw - 40px));
    max-height:34vh;
    overflow:auto;
    padding:14px 16px;
    border-radius:16px;
    background:rgba(18, 12, 10, 0.84);
    border:1px solid rgba(255, 240, 205, 0.16);
    box-shadow:0 18px 40px rgba(0,0,0,0.35);
    color:#ead7b3;
  }
  body.debug #debug-panel{
    display:block;
  }
  #debug-panel h1{
    margin:0 0 10px;
    font-size:15px;
    color:#f5e4c0;
    letter-spacing:0.8px;
  }
  #debug-panel p{
    margin:0 0 8px;
    font-size:13px;
    line-height:1.55;
  }
  #debug-panel ul{
    margin:0;
    padding-left:18px;
    font-size:13px;
    line-height:1.55;
  }
  #debug-panel li + li{
    margin-top:4px;
  }
</style>
</head>
<body>
<div id="viewport">
  <div id="shell" aria-label="原母版风格战斗界面预览">
    <div id="artboard">
      <img class="layer" src="external-data/ysbzs_original_style_layer_pack/layers_png/00_paper_texture.png" alt="">
      <img class="layer" src="external-data/ysbzs_original_style_layer_pack/layers_png/01_outer_scroll_border.png" alt="">
      <img class="layer" src="external-data/ysbzs_original_style_layer_pack/layers_png/02_ui_panels_cards_buttons.png" alt="">
      <img class="layer" src="external-data/ysbzs_original_style_layer_pack/layers_png/03_central_8x8_board_grid.png" alt="">
      <img class="layer" src="external-data/ysbzs_original_style_layer_pack/layers_png/04_board_terrain_and_element_layers.png" alt="">
      <img class="layer" src="external-data/ysbzs_original_style_layer_pack/layers_png/05_units_monsters_castles_hp.png" alt="">
      <img class="layer" src="external-data/ysbzs_original_style_layer_pack/layers_png/06_short_preview_hint_and_selection.png" alt="">
      <img class="layer" src="external-data/ysbzs_original_style_layer_pack/layers_png/07_panel_icons_action_slot_art.png" alt="">
      <img class="layer" src="external-data/ysbzs_original_style_layer_pack/layers_png/08_all_ui_text_rendered.png" alt="">

      <div class="region" data-label="顶部栏" style="left:60px;top:35px;width:1405px;height:60px"></div>
      <div class="region" data-label="左侧栏" style="left:42px;top:130px;width:235px;height:825px"></div>
      <div class="region" data-label="8x8 棋盘" style="left:320px;top:135px;width:688px;height:688px"></div>
      <div class="region" data-label="右侧行动槽" style="left:1045px;top:130px;width:449px;height:708px"></div>
      <div class="region" data-label="战斗日志" style="left:42px;top:850px;width:823px;height:122px"></div>
      <div class="region" data-label="开始战斗按钮" style="left:930px;top:858px;width:252px;height:90px"></div>
      <div class="region" data-label="AI 战斗按钮" style="left:1215px;top:858px;width:220px;height:90px"></div>
    </div>
  </div>
</div>

<div id="hud-note">独立预览页 · 按 <b>D</b> 可切换区域标注</div>

<aside id="debug-panel" aria-live="polite">
  <h1>当前页说明</h1>
  <p>这页只追求原母版效果 1:1 还原，默认不接运行时功能。现有图层不够细的区域保持静态，不强行拼功能。</p>
  <ul>
    <li>当前用的是完整分层 PNG 叠加，不依赖现有 `index.html` DOM。</li>
    <li>棋盘、按钮、侧栏、日志都保持图包原始排版和文字。</li>
    <li>后续若要接功能，优先需要独立按钮态、独立文字层、独立单位/图标素材，而不是整页文字烘焙图。</li>
  </ul>
</aside>

<script src="original-style-battle-preview.js"></script>
</body>
</html>
