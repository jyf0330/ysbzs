table_roles:
  01_宠物主表: 宠物母表；名称、元素、品质、体型、定位、形状、标签等基础信息。
  02_怪物模板: 怪物最终数值源；以宠物ID关联宠物，HP/攻/防/盾/行动以这里为准。
  03_怪物波次: 出怪脚本；只排天数/回合/宠物ID/数量/位置。
  04_机制词条库: 效果词条库；机制ID唯一。
  05_事件主表: 事件选项和奖励/惩罚；引用宠物ID、机制ID、池ID。
  06_商店奖励池: 商店和奖励池入口；一行一个宠物商品入口。
  07_遗物祝福: 长期被动/祝福/装备/诅咒；引用机制ID，可关联宠物和池。
  08_形状行动槽: 宠物行动槽/形状/技能显示源；127宠物全覆盖。
  09_跨表校验: 人工审核表；所有缺失数应为0。
