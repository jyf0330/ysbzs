  file: 04_机制词条库_60条规则_20260606.yaml
  generated_at: 2026-06-06 10:40
  source_table: 04_机制词条库_60条策划好读版_20260606.xlsx
  row_count: 61
  design_note: M00 为 none 占位；M01-M60 为正式机制词条。表格服务策划阅读，YAML服务程序接入。
runtime_policy:
  truth_source: game-data-source/tables/04_机制词条库_60条策划好读版.xlsx + game-data-source/yaml/mechanism_library.yaml
  id_rule: 机制ID必须唯一；宠物/怪物/事件/波次只引用 mechanism.id，不复制完整规则。
  review_rule: REVIEW/空字符串不得进入 runtime；未知 mechanism_id 必须报错或按 pending skip 显示警告。
  none_rule: none 是正式无机制占位，脚本可安全跳过。
  fire_cross_rule: mech_fire_cross_detonate_diamond 只允许钻石火魔在场或背包时启用，不得默认全局启用。
  trap_stack_rule: 陷阱是地形层，可叠加；触发时同格所有元素陷阱可一起结算。
  round_rule: 战斗目标5回合高奖、10回合失败；波次/奖励机制必须能读取 clear_round。
trigger_order:
- battle_start
- round_start
- target_select
- before_damage
- after_hit
- after_damage
- on_shield_break
- after_element_apply
- element_damage
- element_settle
- after_action
- after_kill
- ally_death
- on_enter_cell
- round_end
- on_death
- battle_end
- battle_fail
score_policy:
  '0': 无机制/占位
  1-3: 轻机制，适合早期小怪或低档宠物
  4-6: 中机制，适合常规宠物/怪物
  7-8: 强机制，适合精英、核心宠物或波次压力
  9-10: 高风险机制，默认先做待接入或首领专属
categories:
  M01-M10: 防御/护盾
  M11-M20: 反击/爆炸
  M21-M30: 成长/狂暴
  M31-M40: 召唤/分裂
  M41-M50: 元素/陷阱
  M51-M60: 诅咒/波次/奖励
