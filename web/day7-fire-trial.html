<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>第7天火核心试炼 - 元素背包史</title>
<style>
  *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f3e4c5;color:#2d1c10;}
  header{padding:14px 18px;background:#3a2413;color:#f8ebcf;display:flex;gap:12px;align-items:center;justify-content:space-between;}
  header a{color:#ffd98a;text-decoration:none} h1{font-size:20px;margin:0}.wrap{display:grid;grid-template-columns:360px 1fr 420px;gap:12px;padding:12px;min-height:calc(100vh - 56px)}
  .panel{background:#fff5dc;border:2px solid #6d4b28;border-radius:12px;padding:10px;box-shadow:0 3px 0 #3a2413}.panel h2{font-size:16px;margin:0 0 8px}.buttons{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.buttons button{border:0;background:#6b3f1f;color:#fff5dc;border-radius:8px;padding:8px 10px;font-weight:700;cursor:pointer}.buttons button:hover{background:#8b562d}
  .status{font-size:13px;line-height:1.55;background:#f8ebcf;border-radius:8px;padding:8px;white-space:pre-wrap}.board{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;background:#5e3d1f;padding:5px;border-radius:10px;max-width:720px;margin:auto}.cell{aspect-ratio:1/1;background:#f6dfad;border:1px solid rgba(0,0,0,.25);border-radius:6px;padding:3px;font-size:11px;position:relative;overflow:hidden}.cell.enemy-area{background:#e9c99a}.cell.hero-area{background:#f4dca7}.coord{position:absolute;right:3px;top:2px;opacity:.45;font-size:9px}.unit{font-weight:800;line-height:1.1;margin-top:12px}.hero{color:#8a180c}.enemy{color:#182e7a}.leader{color:#4a1266}.elem{position:absolute;left:3px;bottom:2px;font-size:10px;background:rgba(255,255,255,.6);border-radius:4px;padding:1px 2px}.fire{color:#c22616}.water{color:#1268c4}.wind{color:#257a33}.cards{display:grid;grid-template-columns:1fr;gap:8px}.card{background:#f8ebcf;border:1px solid #9c7642;border-radius:8px;padding:8px;font-size:13px;line-height:1.45}.dead{opacity:.5;text-decoration:line-through}.log{height:70vh;overflow:auto;background:#26180e;color:#ffeac0;border-radius:10px;padding:10px;font-size:13px;line-height:1.5;white-space:pre-wrap}.badge{display:inline-block;background:#7a4523;color:#fff5dc;border-radius:999px;padding:2px 7px;margin:2px;font-size:12px}.pass{background:#147a32}.fail{background:#a33b20}.small{font-size:12px;opacity:.8}@media(max-width:1100px){.wrap{grid-template-columns:1fr}.log{height:360px}.board{max-width:92vw}}
</style>
</head>
<body>
<header><h1>第7天火核心试炼：水催化 · 风聚火 · 火爆发</h1><div><a href="/">返回原界面</a></div></header>
<div class="wrap">
  <section class="panel">
    <h2>实机操作</h2>
    <div class="buttons">
      <button id="setup">重置第7天试炼</button>
      <button id="run1">执行第1回合</button>
      <button id="refresh">刷新状态</button>
    </div>
    <div id="summary" class="status">加载中...</div>
    <h2 style="margin-top:12px">我方阵容</h2><div id="heroes" class="cards"></div>
    <h2 style="margin-top:12px">敌方考题</h2><div id="enemies" class="cards"></div>
  </section>
  <section class="panel"><h2>8×8 棋盘</h2><div id="board" class="board"></div><p class="small">右上4×4为敌方试炼区域；兽群统领固定第1行第8列。格子内火/水/风层来自原 ViewModel 的 board.cells。</p></section>
  <section class="panel"><h2>核心战斗日志</h2><div id="log" class="log"></div></section>
</div>
<script>
const api = async (path, body) => {
  const res = await fetch(path, { method: body ? 'POST' : 'GET', headers: body ? { 'content-type':'application/json' } : undefined, body: body ? JSON.stringify(body) : undefined, cache:'no-store' });
  const data = await res.json(); if (!res.ok || data.ok === false) throw new Error(data.error || res.status); return data;
};
const pos = p => p ? `第${p.r+1}行第${p.c+1}列` : '无';
const unitLine = u => `${u.name}｜HP ${u.hp}/${u.maxHp}｜盾 ${u.shield||0}｜攻 ${u.atk}｜行动 ${u.ap}｜${pos(u.position)}`;
function renderBoard(vm){
  const b=document.getElementById('board'); b.innerHTML='';
  for(const cell of vm.board.cells){
    const d=document.createElement('div'); d.className='cell';
    if(cell.r<=3 && cell.c>=4) d.classList.add('enemy-area');
    if(cell.c<=2) d.classList.add('hero-area');
    const coord=document.createElement('div'); coord.className='coord'; coord.textContent=`${cell.r+1},${cell.c+1}`; d.appendChild(coord);
    if(cell.unitId){
      const u=[...(vm.heroes||[]),...(vm.enemies||[]),vm.leaders?.player,vm.leaders?.enemy].filter(Boolean).find(x=>x.id===cell.unitId);
      const div=document.createElement('div'); div.className='unit '+(u?.side==='hero'?'hero':(cell.leaderId?'leader':'enemy')); div.textContent=(u?.name||cell.unitName||cell.unitId).replace('黄金复制体','复制'); d.appendChild(div);
    }
    const e=cell.elements||{}; const parts=[]; if(e['火']) parts.push(`<span class="fire">火${e['火']}</span>`); if(e['水']) parts.push(`<span class="water">水${e['水']}</span>`); if(e['风']) parts.push(`<span class="wind">风${e['风']}</span>`);
    if(parts.length){ const ed=document.createElement('div'); ed.className='elem'; ed.innerHTML=parts.join(' '); d.appendChild(ed); }
    b.appendChild(d);
  }
}
function render(vm){
  const t=vm.day7Trial;
  document.getElementById('summary').innerHTML = t ? [
    `<span class="badge">${t.title}</span>`,
    `<span class="badge ${t.passedRound1Standard?'pass':'fail'}">第1回合击杀 ${t.round1KillCount}/2</span>`,
    `敌方区域：${t.enemyArea}`,
    `敌方英雄：${t.enemyHeroPosition}`,
    `目标：${t.objective}`,
    `已击杀：${t.round1Kills.join('、') || '无'}`,
  ].join('\n') : '尚未进入第7天试炼。';
  document.getElementById('heroes').innerHTML=(vm.heroes||[]).map(u=>`<div class="card">${unitLine(u)}<br>形状：${u.shape?.shapeName||'-'}<br>定位：${u.role||'-'}</div>`).join('');
  document.getElementById('enemies').innerHTML=(vm.enemies||[]).map(u=>`<div class="card ${u.alive===false||u.hp<=0?'dead':''}">${unitLine(u)}<br>题型：${u.role||'-'}<br>形状：${u.shape?.shapeName||'-'}</div>`).join('') || '<div class="card">敌方复制体已清空</div>';
  renderBoard(vm);
  const trace=(vm.battleTrace||vm.events||[]).filter(e=>/DAY7|TRIAL|DAMAGE|DEAD|MOVE|APPLY_ELEMENT|ROUND/.test(e.type));
  document.getElementById('log').textContent=trace.map(e=>`[${e.step}] ${e.text}`).join('\n');
}
async function refresh(){ const data=await api('/api/view'); render(data.viewModel); }
document.getElementById('setup').onclick=async()=>{ const d=await api('/api/action',{type:'SETUP_DAY7_FIRE_TRIAL'}); render(d.viewModel); };
document.getElementById('run1').onclick=async()=>{ const d=await api('/api/action',{type:'RUN_DAY7_FIRE_TURN_1'}); render(d.viewModel); };
document.getElementById('refresh').onclick=refresh;
(async()=>{
  await api('/api/action',{type:'SETUP_DAY7_FIRE_TRIAL'});
  if (new URLSearchParams(location.search).get('autorun') === '1') await api('/api/action',{type:'RUN_DAY7_FIRE_TURN_1'});
  await refresh();
})().catch(e=>{ document.getElementById('summary').textContent=e.stack||e.message; });
</script>
</body>
</html>
