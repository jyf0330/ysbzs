<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>元素背包史 · 新交互界面</title>
  <link rel="stylesheet" href="ux-app.css" />
</head>
<body>
  <div id="game-shell" class="app-shell" data-phase="loading">
    <header class="topbar">
      <section class="brand-block">
        <div class="eyebrow">元素背包史 / YSBZS</div>
        <h1>棋盘战斗交互重构版</h1>
      </section>
      <section class="status-strip" aria-label="战斗状态">
        <div class="status-pill"><span>阶段</span><strong id="phase-label">加载中</strong></div>
        <div class="status-pill"><span>天数</span><strong id="day-label">-</strong></div>
        <div class="status-pill"><span>回合</span><strong id="round-label">-</strong></div>
        <div class="status-pill gold"><span>金币</span><strong id="gold-label">0</strong></div>
        <div class="status-pill"><span>版本</span><strong id="state-version-label">v0</strong></div>
      </section>
      <section class="leader-strip" aria-label="双方核心血量">
        <div class="leader-card player">
          <span>我方英雄</span>
          <strong id="p-castle-txt">-/ -</strong>
        </div>
        <div class="leader-card enemy">
          <span>敌方Boss</span>
          <strong id="e-castle-txt">-/ -</strong>
        </div>
      </section>
    </header>

    <main class="main-layout">
      <aside class="left-panel panel">
        <div class="panel-head">
          <h2>英雄选择</h2>
          <span id="hero-count">0/0</span>
        </div>
        <div id="hero-list" class="hero-list" aria-label="我方英雄列表"></div>

        <div class="panel-head compact">
          <h2>阵容</h2>
          <span id="roster-count">0/4</span>
        </div>
        <div id="roster-list" class="roster-list" aria-label="阵容管理列表"></div>

        <div class="panel-head compact">
          <h2>目标信息</h2>
        </div>
        <div id="cell-detail" class="detail-card empty">选择棋盘格后显示单位、元素与预览。</div>

        <div class="panel-head compact">
          <h2>试炼</h2>
        </div>
        <div id="trial-card" class="trial-card empty">未进入特殊试炼。</div>
      </aside>

      <section class="board-panel panel">
        <div class="board-toolbar">
          <div>
            <h2>战斗棋盘</h2>
            <p id="operation-hint">先开始战斗，再选择英雄、目标格和行动槽。</p>
          </div>
          <div class="board-actions">
            <button id="new-game-btn" class="ghost-btn" type="button">新开一天</button>
            <button id="day7-btn" class="ghost-btn danger" type="button">第7天火核心试炼</button>
            <button id="save-game-btn" class="ghost-btn" type="button">保存</button>
            <button id="load-game-btn" class="ghost-btn" type="button">读取</button>
          </div>
        </div>
        <div class="board-wrap">
          <div id="board-axis-x" class="axis axis-x"></div>
          <div id="board-axis-y" class="axis axis-y"></div>
          <div id="board" class="board-grid" aria-label="战斗棋盘"></div>
        <div id="cell-popup" class="cell-popup hidden"></div>
        </div>
        <div id="operation-rail" class="operation-rail" aria-label="当前棋盘操作状态"></div>
        <div class="legend-row">
          <span><i class="dot selected"></i>选中</span>
          <span><i class="dot move"></i>可移动</span>
          <span><i class="dot preview"></i>行动预览</span>
          <span><i class="dot threat"></i>敌方威胁</span>
        </div>
      </section>

      <aside class="right-panel panel">
        <div class="panel-head">
          <h2>行动槽</h2>
          <span id="slot-summary">未选择</span>
        </div>
        <div id="slot-list" class="slot-list" aria-label="行动槽列表"></div>

        <div class="panel-head compact">
          <h2>回合控制</h2>
        </div>
        <div class="control-grid">
          <button id="etb" class="primary-btn" type="button">开始战斗</button>
          <button id="monster-btn" class="secondary-btn" type="button">怪物行动</button>
          <button id="exa" class="secondary-btn" type="button">自动战斗</button>
          <button id="full-day-btn" class="secondary-btn" type="button">一键完整流程</button>
        </div>

        <div class="panel-head compact">
          <h2>商店 / 奖励</h2>
        </div>
        <div class="shop-actions">
          <button id="reward-btn" class="ghost-btn" type="button">生成奖励</button>
          <button id="shop-btn" class="ghost-btn" type="button">进入商店</button>
          <button id="roll-shop-btn" class="ghost-btn" type="button">刷新商店</button>
          <button id="exit-shop-btn" class="ghost-btn" type="button">离开商店</button>
        </div>
        <div id="reward-list" class="reward-list"></div>
        <div id="shop-list" class="shop-list"></div>
      </aside>
    </main>

    <footer class="bottom-panel panel">
      <div class="log-tabs" role="tablist">
        <button class="log-tab active" data-log-tab="events" type="button">事件</button>
        <button class="log-tab" data-log-tab="report" type="button">战报</button>
        <button class="log-tab" data-log-tab="replay" type="button">回放</button>
        <button class="log-tab" data-log-tab="debug" type="button">调试</button>
      </div>
      <div id="log" class="log-view"></div>
    </footer>

    <div id="ap-modal" class="ap-modal hidden" aria-hidden="true"></div>
    <div id="tooltip" class="tooltip hidden" role="tooltip"></div>
    <div id="phase-banner" class="phase-banner" aria-hidden="true"></div>
    <div id="toast-stack" class="toast-stack" aria-live="polite"></div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
