<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>元素背包史 · 新交互界面</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="ux-app.css" />
</head>
<body>
  <div id="game-shell" class="app-shell" data-phase="loading">
    <header class="topbar">
      <section class="brand-block">
        <div class="eyebrow">元素背包史 / YSBZS</div>
        <h1>棋盘战斗交互重构版</h1>
        <div class="brand-actions">
          <a class="fullscreen-btn" href="daily-flow.html" title="打开每日流程页面">流程</a>
          <a class="fullscreen-btn" href="puzzle-submission.html" title="打开玩家谜题投稿器">投稿</a>
          <a class="fullscreen-btn" href="puzzle-solver.html" title="打开谜题求解器实验台">求解器</a>
          <button id="fullscreen-btn" class="fullscreen-btn" type="button" aria-pressed="false" title="全屏显示游戏">全屏</button>
        </div>
      </section>
      <section class="status-strip" aria-label="战斗状态">
        <div class="status-pill"><span>阶段</span><strong id="phase-label">加载中</strong></div>
        <div class="status-pill"><span>天数</span><strong id="day-label">-</strong></div>
        <div class="status-pill route-progress"><span>进度</span><strong id="route-progress-label">-</strong></div>
        <div class="status-pill gold"><span>金币</span><strong id="gold-label">0</strong></div>
        <div class="status-pill build-core"><span>构筑核心</span><strong id="build-core-label">尚未形成</strong></div>
        <div class="status-pill next-step"><span>下一步</span><strong id="next-step-label">读取中</strong></div>
        <span id="state-version-label" class="state-version-hidden">v0</span>
      </section>
      <section class="leader-strip" aria-label="双方核心血量">
        <div class="leader-card player">
          <span>我方英雄</span>
          <strong id="p-castle-txt">-/ -</strong>
        </div>
        <div class="leader-card enemy">
          <span>敌方Boss</span>
          <strong id="e-castle-txt">-/ -</strong>
        </div>
      </section>
    </header>

    <main class="main-layout">
      <aside class="left-panel panel">
        <section id="active-pet-zone" class="active-pet-zone">
          <div class="panel-head active-head">
            <h2>上阵宠物</h2>
            <div class="active-head-actions">
              <span id="hero-count">0人</span>
              <button id="prep-open-btn" class="prep-open-btn primary-btn" type="button">备战</button>
            </div>
          </div>
          <div id="hero-list" class="hero-list" aria-label="上阵宠物列表"></div>
        </section>
        <section id="action-block-zone" class="action-block-zone">
          <div class="panel-head compact">
            <h2>行动块</h2>
            <span id="action-block-count">0/12</span>
          </div>
          <div id="slot-list" class="slot-list" aria-label="12 个行动块"></div>
        </section>
        <div id="action-popover" class="action-popover hidden" aria-hidden="true"></div>
      </aside>

      <section class="board-panel panel">
        <div class="board-toolbar">
          <div>
            <h2>战斗棋盘</h2>
            <p id="operation-hint">先开始战斗，再选择英雄、目标格和行动槽。</p>
          </div>
          <div class="board-actions">
            <button id="new-game-btn" class="ghost-btn" type="button">新开一天</button>
            <button id="day7-btn" class="ghost-btn danger" type="button">第7天火核心试炼</button>
            <button id="save-game-btn" class="ghost-btn" type="button">保存</button>
            <button id="load-game-btn" class="ghost-btn" type="button">读取</button>
          </div>
        </div>
        <div class="board-wrap">
          <div id="board-axis-x" class="axis axis-x"></div>
          <div id="board-axis-y" class="axis axis-y"></div>
          <div id="board" class="board-grid" aria-label="战斗棋盘"></div>
        </div>
        <div id="operation-rail" class="operation-rail" aria-label="当前棋盘操作状态"></div>
        <div id="prep-overlay" class="prep-overlay hidden" aria-hidden="true">
          <div class="prep-head">
            <div>
              <h2>备战台</h2>
              <span id="prep-status">调整阵容后准备开始。</span>
            </div>
            <button id="prep-close-btn" class="ghost-btn" type="button">返回棋盘</button>
          </div>
          <div class="prep-tools">
            <input id="prep-filter" class="prep-filter" type="search" placeholder="筛选名称 / 元素 / 职能" autocomplete="off" />
            <button id="prep-ready-btn" class="primary-btn" type="button">准备开始</button>
          </div>
          <div class="prep-columns">
            <section class="prep-column" data-prep-drop-zone="active">
              <h3>上阵阵容</h3>
              <div id="prep-active-list" class="prep-card-list"></div>
            </section>
            <section class="prep-column" data-prep-drop-zone="bench">
              <h3>背包 / 备战席</h3>
              <div id="prep-bench-list" class="prep-card-list"></div>
            </section>
          </div>
        </div>
        <div class="legend-row">
          <span><i class="dot selected"></i>选中</span>
          <span><i class="dot move"></i>可移动</span>
          <span><i class="dot preview"></i>行动预览</span>
          <span><i class="dot threat"></i>敌方威胁</span>
        </div>
      </section>

      <aside class="right-panel panel">
        <div class="detail-zone">
          <div class="panel-head">
            <h2>详细信息</h2>
            <span id="detail-summary">未选择</span>
          </div>
          <div id="cell-detail" class="detail-card empty">请选择宠物、行动块或棋盘格。</div>
        </div>

        <div class="manual-flow-controls">
          <button id="etb" class="primary-btn" type="button">开始战斗</button>
          <button id="monster-btn" class="secondary-btn" type="button">执行敌方宠物行动</button>
          <button id="undo-flow-btn" class="undo-flow-btn" type="button" disabled>撤回结算</button>
        </div>

        <div class="trial-zone">
          <div id="trial-card" class="trial-card empty">未进入特殊试炼。</div>
        </div>

        <div id="shop-phase-panel" class="shop-phase-panel">
        <div class="panel-head compact">
          <h2>商店 / 奖励</h2>
        </div>
        <div class="shop-actions">
          <button id="node-options-btn" class="ghost-btn" type="button">生成节点</button>
          <button id="battle-options-btn" class="ghost-btn" type="button">生成遭遇</button>
          <button id="reward-btn" class="ghost-btn" type="button">生成奖励</button>
          <button id="shop-btn" class="ghost-btn" type="button">进入商店</button>
          <button id="roll-shop-btn" class="ghost-btn" type="button">刷新商店</button>
          <button id="exit-shop-btn" class="ghost-btn" type="button">离开商店</button>
        </div>
        <div id="reward-list" class="reward-list"></div>
        <div id="shop-list" class="shop-list"></div>
        </div>

        <div id="auto-controls" class="auto-controls">
          <button id="auto-position-btn" class="secondary-btn" type="button">智能调整站位</button>
          <button id="all-out-btn" class="secondary-btn" type="button">我方全部出击</button>
          <button id="full-day-btn" class="secondary-btn" type="button">一键完整流程</button>
          <button id="full-run-btn" class="secondary-btn" type="button">完整Run</button>
        </div>
      </aside>
    </main>

    <footer class="bottom-panel panel">
      <div class="log-tabs" role="tablist">
        <button class="log-tab active" data-log-tab="events" type="button">事件</button>
        <button class="log-tab" data-log-tab="report" type="button">战报</button>
        <button class="log-tab" data-log-tab="replay" type="button">回放</button>
        <button class="log-tab" data-log-tab="debug" type="button">调试</button>
      </div>
      <div id="log" class="log-view"></div>
    </footer>

    <div id="ap-modal" class="ap-modal hidden" aria-hidden="true"></div>
    <div id="phase-banner" class="phase-banner" aria-hidden="true"></div>
    <div id="toast-stack" class="toast-stack" aria-live="polite"></div>
  </div>
  <script src="js/local-engine.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
